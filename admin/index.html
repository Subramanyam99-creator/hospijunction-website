    body{font-family:var(--body);font-size:14px;color:var(--ink-2);background:#F4F2ED;-webkit-font-smoothing:antialiased}

<body>

<script type="text/babel">
/* =========================================================

/* =========================================================
   HELPERS
   ========================================================= */
const fmt = {
  date: d => d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—',
  time: t => t ? t.slice(0,5) : '—',
  money: n => n!=null ? `₹${Number(n).toLocaleString('en-IN')}` : '—',
  ago: d => { if(!d) return '—'; const m=Math.floor((Date.now()-new Date(d).getTime())/60000); if(m<60) return `${m}m ago`; const h=Math.floor(m/60); if(h<24) return `${h}h ago`; return `${Math.floor(h/24)}d ago`; },
};
const statusBadge = s => {
  const m={confirmed:'badge-blue',booked:'badge-blue',completed:'badge-green',cancelled:'badge-red',checked_in:'badge-amber',in_progress:'badge-amber',no_show:'badge-gray',paid:'badge-green',captured:'badge-green',pending:'badge-amber',failed:'badge-red',refunded:'badge-amber',created:'badge-gray',processing:'badge-amber'};
  return <span className={`badge ${m[(s||'').toLowerCase()]||'badge-gray'}`}>{s||'—'}</span>;
};
const PAGE_SIZE = 20;

/* =========================================================
   LOGIN
   ========================================================= */
function LoginPage() {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handle = async e => {
    e.preventDefault(); setError('');
    if (email.toLowerCase() !== ADMIN_EMAIL) { setError('Access denied. Admin accounts only.'); return; }
    setLoading(true);
    const { error: err } = await sb.auth.signInWithPassword({ email, password: pass });
    if (err) setError(err.message);
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={handle}>
        <div className="login-logo">HJ Admin</div>
        <div className="login-sub">HospiJunction Super Admin Panel</div>
        <label className="login-label">Email</label>
        <input className="login-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@hospijunction.com" required />
        <label className="login-label">Password</label>
        <input className="login-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required />

/* =========================================================
   SIDEBAR

];
function Sidebar({ page, setPage, user }) {

/* =========================================================
   DATA HOOK
   ========================================================= */
function useQuery(table, opts={}) {
  const { select='*', order='created_at', ascending=false, page=0, pageSize=PAGE_SIZE, filters=[], search, searchCols=[] } = opts;
  const [data, setData] = useState([]);
  const [count, setCount] = useState(0);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    let q = sb.from(table).select(select, {count:'exact'});
    filters.forEach(([col,op,val]) => { q = q[op](col,val); });
    if (search && searchCols.length) q = q.or(searchCols.map(c=>`${c}.ilike.%${search}%`).join(','));
    q = q.order(order,{ascending}).range(page*pageSize,(page+1)*pageSize-1);
    const {data:rows,count:total,error} = await q;
    if(!error){setData(rows||[]);setCount(total||0);}
    setLoading(false);
  },[table,select,order,ascending,page,pageSize,JSON.stringify(filters),search]);

  useEffect(()=>{load();},[load]);
  return {data,count,loading,reload:load};
}

/* =========================================================
   DETAIL MODAL
   ========================================================= */
function DetailModal({title,rows,onClose,children}) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{title}</div>
        {rows && rows.map(([l,v],i)=><div className="detail-row" key={i}><div className="detail-label">{l}</div><div className="detail-value">{v??'—'}</div></div>)}
        {children}
        <div style={{marginTop:20,textAlign:'right'}}><button className="btn-sm" onClick={onClose}>Close</button></div>
      </div>
    </div>
  );
}

/* =========================================================
   PAGINATION
   ========================================================= */
function Pager({page,setPage,count}) {
  if (count<=PAGE_SIZE) return null;
  return (
    <div className="pagination">
      <span>Showing {page*PAGE_SIZE+1}–{Math.min((page+1)*PAGE_SIZE,count)} of {count}</span>
      <div className="page-btns">
        <button className="page-btn" disabled={page===0} onClick={()=>setPage(p=>p-1)}>Prev</button>
        <button className="page-btn" disabled={(page+1)*PAGE_SIZE>=count} onClick={()=>setPage(p=>p+1)}>Next</button>
      </div>
    </div>
  );
}

/* =========================================================
   HOSPITALS
   ========================================================= */

  const toggle = async(id,field,val)=>{await sb.from('hospital_profiles').update({[field]:val}).eq('id',id);reload();};

  const viewHospital = async (h) => {

/* =========================================================
   GST & INVOICES
   ========================================================= */
function GSTPage() {
  const now = new Date();
  const [month,setMonth] = useState(now.getMonth());
  const [year,setYear] = useState(now.getFullYear());
  const [page,setPage] = useState(0);
  const [filter,setFilter] = useState('all');
  const [detail,setDetail] = useState(null);
  const [downloading,setDownloading] = useState(false);
  const [downloadMsg,setDownloadMsg] = useState('');

  const monthStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const nextMonth = month===11 ? `${year+1}-01-01` : `${year}-${String(month+2).padStart(2,'0')}-01`;

  const filters = [['invoice_date','gte',monthStart],['invoice_date','lt',nextMonth]];
  if (filter!=='all') filters.push(['invoice_type','eq',filter]);

  const {data,count,loading} = useQuery('gst_invoices',{order:'invoice_date',ascending:false,page,filters,pageSize:PAGE_SIZE});

  const [monthStats,setMonthStats] = useState({total:0,taxable:0,gst:0,count:0,credits:0});
  useEffect(()=>{
    (async()=>{
      const {data:all} = await sb.from('gst_invoices').select('invoice_type,taxable_value,cgst_amount,sgst_amount,igst_amount,total_amount')
        .gte('invoice_date',monthStart).lt('invoice_date',nextMonth);
      if(!all) return;
      const invoices = all.filter(i=>i.invoice_type==='invoice'||i.invoice_type==='tax_invoice');
      const credits = all.filter(i=>i.invoice_type==='credit_note');
      setMonthStats({
        count:invoices.length, credits:credits.length,
        taxable:invoices.reduce((s,r)=>s+Number(r.taxable_value||0),0),
        gst:invoices.reduce((s,r)=>s+Number(r.cgst_amount||0)+Number(r.sgst_amount||0)+Number(r.igst_amount||0),0),
        total:invoices.reduce((s,r)=>s+Number(r.total_amount||0),0),
      });
    })();
  },[monthStart,nextMonth]);

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const viewPdf = async inv => {
    if(!inv.pdf_storage_path){alert('No PDF available for this invoice');return;}
    const {data:urlData} = await sb.storage.from('gst-invoices').createSignedUrl(inv.pdf_storage_path,3600);
    if(urlData?.signedUrl) window.open(urlData.signedUrl,'_blank');
    else alert('Could not generate PDF link');
  };

  const downloadExcel = async () => {
    setDownloading(true);setDownloadMsg('Fetching invoices…');
    const {data:all} = await sb.from('gst_invoices').select('*').gte('invoice_date',monthStart).lt('invoice_date',nextMonth).order('invoice_date',{ascending:true});
    if(!all||all.length===0){setDownloading(false);setDownloadMsg('');alert('No invoices for this month');return;}
    setDownloadMsg('Generating Excel…');
    const rows = all.map(inv=>({
      'Invoice #':inv.invoice_number,'Date':inv.invoice_date,'Type':inv.invoice_type,
      'Financial Year':inv.financial_year,'Buyer Name':inv.buyer_name,'Buyer State':inv.buyer_state,
      'Buyer State Code':inv.buyer_state_code,'Buyer Email':inv.buyer_email,'Buyer Phone':inv.buyer_phone,
      'HSN/SAC':inv.hsn_sac_code,'Description':inv.description,'Place of Supply':inv.place_of_supply_state_code,
      'Taxable Value':Number(inv.taxable_value),'CGST Rate %':Number(inv.cgst_rate),'CGST Amount':Number(inv.cgst_amount),
      'SGST Rate %':Number(inv.sgst_rate),'SGST Amount':Number(inv.sgst_amount),
      'IGST Rate %':Number(inv.igst_rate),'IGST Amount':Number(inv.igst_amount),
      'Total Amount':Number(inv.total_amount),'Reverse Charge':inv.reverse_charge?'Yes':'No',
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = Object.keys(rows[0]).map(k=>({wch:Math.max(k.length,...rows.map(r=>String(r[k]||'').length))+2}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,`${monthNames[month]} ${year}`);
    XLSX.writeFile(wb,`HospiJunction_GST_${monthNames[month]}_${year}.xlsx`);
    setDownloading(false);setDownloadMsg('');
  };

  const downloadZip = async () => {
    setDownloading(true);setDownloadMsg('Fetching invoice list…');
    const {data:all} = await sb.from('gst_invoices').select('invoice_number,invoice_type,invoice_date,pdf_storage_path')
      .gte('invoice_date',monthStart).lt('invoice_date',nextMonth).order('invoice_date',{ascending:true});
    const withPdfs = (all||[]).filter(i=>i.pdf_storage_path);
    if(withPdfs.length===0){setDownloading(false);setDownloadMsg('');alert('No PDFs available for this month');return;}
    const zip = new JSZip();
    let done = 0;
    for(const inv of withPdfs){
      done++;setDownloadMsg(`Downloading PDF ${done}/${withPdfs.length}…`);
      try{
        const {data:urlData} = await sb.storage.from('gst-invoices').createSignedUrl(inv.pdf_storage_path,300);
        if(urlData?.signedUrl){const resp=await fetch(urlData.signedUrl);if(resp.ok){const blob=await resp.blob();zip.file(`${inv.invoice_number}_${inv.invoice_type}.pdf`,blob);}}
      }catch(e){console.error('Failed to fetch',inv.invoice_number,e);}
    }
    setDownloadMsg('Creating ZIP file…');
    const zipBlob = await zip.generateAsync({type:'blob'});
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');a.href=url;a.download=`HospiJunction_Invoices_${monthNames[month]}_${year}.zip`;a.click();
    URL.revokeObjectURL(url);setDownloading(false);setDownloadMsg('');
  };

  const downloadAll = async () => { await downloadExcel(); await downloadZip(); };

  return (
    <>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <select value={month} onChange={e=>{setMonth(Number(e.target.value));setPage(0);}}
          style={{padding:'8px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontFamily:'var(--body)',fontSize:14,fontWeight:600}}>
          {monthNames.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
        <select value={year} onChange={e=>{setYear(Number(e.target.value));setPage(0);}}
          style={{padding:'8px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontFamily:'var(--body)',fontSize:14,fontWeight:600}}>
          {[2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <div style={{flex:1}}/>
        <button className="btn-sm primary" onClick={downloadExcel} disabled={downloading} style={{padding:'8px 16px'}}>📊 Excel</button>
        <button className="btn-sm primary" onClick={downloadZip} disabled={downloading} style={{padding:'8px 16px'}}>📁 PDFs ZIP</button>
        <button className="btn-sm" onClick={downloadAll} disabled={downloading} style={{padding:'8px 16px',background:'var(--positive)',color:'var(--white)',borderColor:'var(--positive)'}}>⬇ Download All</button>
      </div>
      {downloading&&<div style={{padding:'14px 20px',background:'var(--blue-50)',borderRadius:10,marginBottom:18,fontSize:13,color:'var(--blue-900)',display:'flex',alignItems:'center',gap:10}}><div className="spin" style={{width:18,height:18,borderWidth:2}}/> {downloadMsg}</div>}
      <div className="stats">
        <div className="stat-card"><div className="stat-label">Invoices</div><div className="stat-value">{monthStats.count}</div></div>
        <div className="stat-card"><div className="stat-label">Credit Notes</div><div className="stat-value">{monthStats.credits}</div></div>
        <div className="stat-card"><div className="stat-label">Taxable Value</div><div className="stat-value">{fmt.money(monthStats.taxable)}</div></div>
        <div className="stat-card"><div className="stat-label">GST Collected</div><div className="stat-value">{fmt.money(monthStats.gst)}</div></div>
        <div className="stat-card"><div className="stat-label">Total Billed</div><div className="stat-value">{fmt.money(monthStats.total)}</div></div>
      </div>
      <div className="card">
        <div className="card-header">
          <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
            <div className="card-title">{monthNames[month]} {year} Invoices ({count})</div>
            <div className="filter-row">
              {['all','tax_invoice','invoice','credit_note'].map(f=><button key={f} className={`filter-btn ${filter===f?'active':''}`} onClick={()=>{setFilter(f);setPage(0);}}>
                {f==='all'?'All':f==='tax_invoice'?'Tax Invoice':f==='credit_note'?'Credit Note':'Invoice'}
              </button>)}
            </div>
          </div>
        </div>
        {loading?<div className="loading"><div className="spin"/></div>:data.length===0?<div className="empty">No invoices for this period</div>:(
          <table><thead><tr><th>Invoice #</th><th>Date</th><th>Type</th><th>Buyer</th><th>Taxable</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Total</th><th>Actions</th></tr></thead><tbody>
            {data.map(inv=><tr key={inv.id}>
              <td style={{fontWeight:600,color:'var(--ink)',fontFamily:'monospace',fontSize:12}}>{inv.invoice_number}</td>
              <td>{fmt.date(inv.invoice_date)}</td>
              <td>{inv.invoice_type==='credit_note'?<span className="badge badge-amber">Credit Note</span>:<span className="badge badge-blue">Invoice</span>}</td>
              <td><div style={{fontWeight:500}}>{inv.buyer_name}</div><div style={{fontSize:11,color:'var(--muted)'}}>{inv.buyer_state}</div></td>
              <td>{fmt.money(inv.taxable_value)}</td><td>{fmt.money(inv.cgst_amount)}</td><td>{fmt.money(inv.sgst_amount)}</td><td>{fmt.money(inv.igst_amount)}</td>
              <td style={{fontWeight:600}}>{fmt.money(inv.total_amount)}</td>
              <td style={{display:'flex',gap:6}}>
                <button className="btn-sm" onClick={()=>setDetail(inv)}>Details</button>
                <button className="btn-sm primary" onClick={()=>viewPdf(inv)}>PDF</button>
              </td>
            </tr>)}
          </tbody></table>
        )}
        <Pager page={page} setPage={setPage} count={count}/>
      </div>
      {detail&&<DetailModal title={`Invoice ${detail.invoice_number}`} onClose={()=>setDetail(null)} rows={[
        ['Invoice #',detail.invoice_number],['Date',fmt.date(detail.invoice_date)],['Type',detail.invoice_type],
        ['Financial Year',detail.financial_year],['HSN/SAC',detail.hsn_sac_code],['Description',detail.description],
        ['—',''],
        ['Seller',detail.seller_name],['Seller GSTIN',detail.seller_gstin],['Seller CIN',detail.seller_cin],
        ['Seller Address',detail.seller_address],['Seller State Code',detail.seller_state_code],
        ['—',''],
        ['Buyer',detail.buyer_name],['Buyer State',`${detail.buyer_state} (${detail.buyer_state_code})`],
        ['Buyer Email',detail.buyer_email],['Buyer Phone',detail.buyer_phone],
        ['Place of Supply',detail.place_of_supply_state_code],
        ['—',''],
        ['Taxable Value',fmt.money(detail.taxable_value)],
        ['CGST',`${detail.cgst_rate}% → ${fmt.money(detail.cgst_amount)}`],
        ['SGST',`${detail.sgst_rate}% → ${fmt.money(detail.sgst_amount)}`],
        ['IGST',`${detail.igst_rate}% → ${fmt.money(detail.igst_amount)}`],
        ['Total',fmt.money(detail.total_amount)],
        ['Reverse Charge',detail.reverse_charge?'Yes':'No'],
      ]}/>}
    </>
  );
}

/* =========================================================
   APP
   ========================================================= */
function App() {
  const [user,setUser]=useState(null);const [checking,setChecking]=useState(true);const [page,setPage]=useState('dashboard');

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user?.email?.toLowerCase()===ADMIN_EMAIL) setUser(session.user);
      setChecking(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user?.email?.toLowerCase()===ADMIN_EMAIL) setUser(session.user);
      else setUser(null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  if(checking) return <div className="login-wrap"><div className="spin"/></div>;
  if(!user) return <LoginPage/>;

  const PageComponent = {dashboard:DashboardPage,hospitals:HospitalsPage,doctors:DoctorsPage,patients:PatientsPage,appointments:AppointmentsPage,payments:PaymentsPage,refunds:RefundsPage,gst:GSTPage}[page]||DashboardPage;
  const pageLabel = PAGES.find(p=>p.id===page)?.label||'Dashboard';

  return (
    <div className="layout">
      <Sidebar page={page} setPage={setPage} user={user}/>
      <div className="main">
        <div className="topbar"><div className="topbar-title">{pageLabel}</div></div>
        <div className="content"><PageComponent/></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
